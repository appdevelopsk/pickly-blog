  description: "Standard burr grinders — even ones with a 'fine' setting — cannot achieve Turkish grind fineness. Turkish coffee requires a powder-fine grind that's finer than espresso. A 'fine' espresso grind will result in weak, under-extracted Turkish coffee with no foam. Use pre-ground Turkish coffee (Mehmet Efendi) or a dedicated Turkish hand grinder like Zassenhaus that can reach the correct fineness."
