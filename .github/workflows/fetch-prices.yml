name: Fetch Prices

on:
  schedule:
    # 毎日 JST 9:00 (UTC 00:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Fetch prices from Amazon
        run: npx tsx scripts/fetch-prices.ts
        working-directory: site

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/lib/affiliates/prices-override.ts
          if git diff --cached --quiet; then
            echo "No price changes detected."
          else
            git commit -m "chore: update prices [skip ci]"
            git push
          fi
