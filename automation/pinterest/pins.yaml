  title: "Why Turkish Coffee Foam Disappears If You Boil It"
  description: "Turkish coffee's foam is formed by coffee oils and fine particles rising as the liquid approaches boiling — but the foam collapses if you let it boil. Remove the cezve from heat the moment the foam begins to rise (around 90-95°C). Boiling also over-extracts and creates a harsh cup. The key: low heat, patience, watch constantly. Never walk away from a cezve on the stove."
