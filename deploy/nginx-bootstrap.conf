# =============================================================================
# Pickly.blog — Bootstrap nginx vhost (Cloudflare Flexible mode)
# =============================================================================
# 用途: 初回デプロイ用。Cloudflareが Flexible モード(CFがHTTPS終端、オリジンはHTTP)
#       で動いている前提。Let's Encrypt 不要で最速で立ち上げる。
#
# 後日 Cloudflare Origin CA 証明書を入れて Full (strict) に移行する際は
# deploy/nginx.conf に差し替える。
#
# 設置方法:
#   scp deploy/nginx-bootstrap.conf pickly-vps:/tmp/
#   ssh pickly-vps
#   sudo mkdir -p /var/www/pickly.blog
#   sudo chown -R $USER:$USER /var/www/pickly.blog
#   sudo cp /tmp/nginx-bootstrap.conf /etc/nginx/sites-available/pickly.blog
#   sudo ln -sf /etc/nginx/sites-available/pickly.blog /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ---------------------------------------------------------------------------
# Cloudflare の実IP復元 (アクセスログとレート制限のため)
# ---------------------------------------------------------------------------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name pickly.blog www.pickly.blog;

    root /var/www/pickly.blog;
    index index.html;

    # Cloudflare 経由でないリクエストは拒否しない方針(LE取得時など)
    # 必要なら set_real_ip_from でフィルタする

    # ----- Security headers (Cloudflareが追加するものと重複しないよう最小限) -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----- Gzip (Cloudflare が Brotli を前段で追加するが、念のため) -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        image/svg+xml;

    # ----- ログ -----
    access_log /var/log/nginx/pickly.blog.access.log;
    error_log  /var/log/nginx/pickly.blog.error.log warn;

    # ----- キャッシュヘッダー -----
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /og/ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location = /robots.txt   { try_files $uri =404; }
    location = /sitemap.xml  { try_files $uri =404; }
    location = /ads.txt      { try_files $uri =404; }

    # ----- www → apex リダイレクト -----
    if ($host = "www.pickly.blog") {
        return 301 https://pickly.blog$request_uri;
    }

    # ----- Static export ルーティング (Next.js trailingSlash:true) -----
    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }

    error_page 404 /404.html;
    location = /404.html { internal; }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
