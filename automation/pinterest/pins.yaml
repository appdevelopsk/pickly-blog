  description: "The most accessible Turkish coffee setup: a stainless steel cezve ($10-25) plus Mehmet Efendi pre-ground Turkish coffee ($8-15 per 250g). Total cost under $40. Pre-ground Mehmet Efendi is already at the correct Turkish-fine grind — no grinder needed. Use within 1-2 weeks of opening for best foam. Stainless requires no re-tinning, dishwasher-safe."
