  description: "At the top of a trap bar deadlift, avoid hyperextending the lower back — lock out with a neutral spine (glutes squeezed, core braced), not by pushing your hips forward past vertical. Trap bar's high-handle starting position already reduces lumbar demand; compensating with hyperextension at lockout negates that advantage and loads the lumbar discs. Stand tall, don't lean back."
