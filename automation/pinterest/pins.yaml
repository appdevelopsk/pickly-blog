  description: "A traditional copper cezve ($15-35) is the authentic way to brew Turkish coffee — copper heats evenly and quickly, the visual aesthetic is part of the ritual, and the tin-lined interior prevents any metallic reaction with the acidic coffee. For 1-2 cups at a time, a 1-cup size cezve is most controllable. Pre-ground Mehmet Efendi Turkish coffee is the easiest way to start."
