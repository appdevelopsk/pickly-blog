# =============================================================================
# Pickly.blog -- Production Nginx vhost (static site behind Cloudflare)
# =============================================================================
# Usage on VPS:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/pickly.blog
#   sudo ln -s /etc/nginx/sites-available/pickly.blog /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/www/pickly.blog
#   sudo chown -R $USER:$USER /var/www/pickly.blog
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL strategy: Cloudflare Origin CA Certificate (15 year validity, free)
# Generate at: Cloudflare dashboard -> SSL/TLS -> Origin Server -> Create Certificate
# Save files to:
#   /etc/ssl/cloudflare/pickly.blog.pem  (the certificate)
#   /etc/ssl/cloudflare/pickly.blog.key  (the private key, chmod 600)
# Then set Cloudflare SSL/TLS -> Overview -> Full (strict).
# =============================================================================

# ---------------------------------------------------------------------------
# Cloudflare real-IP restoration
# Without this, $remote_addr will always be Cloudflare's IP (logs become
# useless and rate limits hit Cloudflare's whole pool).
# Update the list periodically: https://www.cloudflare.com/ips/
# ---------------------------------------------------------------------------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ---------------------------------------------------------------------------
# Redirect HTTP -> HTTPS (Let's Encrypt also uses :80 for renewal)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name pickly.blog www.pickly.blog;

    # Cloudflare 経由でない直アクセスはHTTPS化
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server (Cloudflare Full Strict mode terminates here)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pickly.blog www.pickly.blog;

    # Document root: rsync target from local build
    root /var/www/pickly.blog;
    index index.html;

    # ----- SSL: Cloudflare Origin CA Certificate -----
    ssl_certificate     /etc/ssl/cloudflare/pickly.blog.pem;
    ssl_certificate_key /etc/ssl/cloudflare/pickly.blog.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_pickly:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ----- Security headers -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ----- Gzip (Cloudflare adds Brotli for free in front) -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/atom+xml
        application/rss+xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ----- Logs -----
    access_log /var/log/nginx/pickly.blog.access.log;
    error_log  /var/log/nginx/pickly.blog.error.log warn;

    # ----- Cache headers -----
    # Hashed Next.js bundle -> 1 year immutable
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # OG images -> 1 day (so Pinterest re-fetches updated thumbnails)
    location /og/ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # robots / sitemap / ads.txt
    location = /robots.txt   { try_files $uri =404; }
    location = /sitemap.xml  { try_files $uri =404; }
    location = /ads.txt      { try_files $uri =404; }

    # ----- Redirect www to apex (apex pickly.blog is the canonical) -----
    if ($host = "www.pickly.blog") {
        return 301 https://pickly.blog$request_uri;
    }

    # ----- Static export routing -----
    # Next.js trailingSlash: true => /en/ resolves to /en/index.html
    # Try $uri then $uri/index.html, then 404 page
    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }

    # ----- 404 page -----
    error_page 404 /404.html;
    location = /404.html { internal; }

    # ----- Block hidden files -----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
